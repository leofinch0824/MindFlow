services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mindflow-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=mindflow
      - POSTGRES_USER=mindflow
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mindflow_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindflow -d mindflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: mindflow-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.siliconflow.cn/v1}
      - AI_MODEL=${AI_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      - MPTEXT_API_KEY=${MPTEXT_API_KEY:-}
      - MPTEXT_BASE_URL=${MPTEXT_BASE_URL:-https://down.mptext.top}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mindflow
      - POSTGRES_USER=mindflow
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mindflow_dev}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: mindflow-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: mindflow-network

volumes:
  postgres-data:
